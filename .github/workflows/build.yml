name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Build Process
        run: |
          cordova create build com.custom.app "MyApp"
          cp -r src/* build/www/
          cd build
          cordova platform add android
          cordova build android --debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-app-release
          path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
