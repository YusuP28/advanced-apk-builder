<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern APK Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="flex items-center justify-center min-h-screen">
        <div class="p-8 bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-md">
            <h1 class="text-2xl font-bold text-emerald-400 mb-6 text-center">APK Builder Pro</h1>
            <p class="text-gray-400 text-sm mb-4 text-center">Status: System Ready</p>
            <div class="space-y-4">
                <input type="text" placeholder="App Name" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <button class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-bold transition">GENERATE APK</button>
            </div>
        </div>
    </div>
</body>
</html>
